<head>
    <meta charset="UTF-8">
    <title>Cadastro de Clientes</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; }
        label { display: block; margin-top: 10px; }
        input { width: 300px; padding: 5px; }
        button { margin-top: 15px; padding: 10px 20px; }
        #resultadoBusca { margin-top: 30px; border-top: 1px solid #ccc; padding-top: 20px; }
    </style>
</head>
<body>

    <h1>Cadastro de Clientes</h1>

    <form id="formCadastro">
        <label for="cpf">CPF:</label>
        <input type="text" id="cpf" required>

        <label for="nome">Nome:</label>
        <input type="text" id="nome" required>

        <label for="endereco">Endereço:</label>
        <input type="text" id="endereco" required>

        <label for="telefone1">Telefone Principal:</label>
        <input type="tel" id="telefone1" required>

        <label for="telefone2">Telefone Secundário:</label>
        <input type="tel" id="telefone2">

        <label for="email">Email:</label>
        <input type="email" id="email" required>

        <button type="submit">Cadastrar</button>
    </form>

    <h2>Buscar Cliente</h2>
    <input type="text" id="campoBusca" placeholder="Digite o nome ou CPF...">
    <div id="resultadoBusca"></div>

    <script>

        const clientes = JSON.parse(localStorage.getItem('clientes')) || [];


        const salvarClientes = () => localStorage.setItem('clientes', JSON.stringify(clientes));


        const validarCPF = cpf => /^[0-9]{11}$/.test(cpf.replace(/\D/g, ''));

        const validarTelefone = telefone => /^\(\d{2}\) \d{5}-\d{4}$/.test(telefone);


        const mostrarResultados = lista => {
            const div = document.getElementById("resultadoBusca");
            div.innerHTML = lista.length ? 
                lista.map(cliente => `
                    <div>
                        <strong>Nome:</strong> ${cliente.nome}<br>
                        <strong>CPF:</strong> ${cliente.cpf}<br>
                        <strong>Endereço:</strong> ${cliente.endereco}<br>
                        <strong>Telefone 1:</strong> ${cliente.telefonePrincipal}<br>
                        <strong>Telefone 2:</strong> ${cliente.telefoneSecundario || 'Não informado'}<br>
                        <strong>Email:</strong> ${cliente.email}<br>
                        <hr>
                    </div>
                `).join('') : '<p>Nenhum cliente encontrado.</p>';
        };


        const adicionarCliente = (cliente) => {
            if (!validarCPF(cliente.cpf)) return alert("CPF inválido.");
            if (!validarTelefone(cliente.telefonePrincipal)) return alert("Telefone principal inválido.");
            if (cliente.telefoneSecundario && !validarTelefone(cliente.telefoneSecundario)) return alert("Telefone secundário inválido.");
            clientes.push(cliente);
            salvarClientes();
            alert("Cliente cadastrado com sucesso!");
            document.getElementById("formCadastro").reset();
        };


        document.getElementById("formCadastro").addEventListener("submit", function(event) {
            event.preventDefault();

            const cliente = {
                cpf: document.getElementById("cpf").value,
                nome: document.getElementById("nome").value,
                endereco: document.getElementById("endereco").value,
                telefonePrincipal: document.getElementById("telefone1").value,
                telefoneSecundario: document.getElementById("telefone2").value,
                email: document.getElementById("email").value
            };

            adicionarCliente(cliente);
        });

      
        document.getElementById("campoBusca").addEventListener("input", function() {
            const termo = this.value.toLowerCase();
            const resultados = clientes.filter(cliente =>
                cliente.nome.toLowerCase().includes(termo) || cliente.cpf.includes(termo)
            );
            mostrarResultados(resultados);
        });

        mostrarResultados(clientes);

    </script>
</body>
</html>
